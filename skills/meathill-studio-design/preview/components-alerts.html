<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Alerts & Toasts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 22px; background: var(--color-cream); display: flex; flex-direction: column; gap: 10px; font-family: var(--font-sans); }
  .alert { display: flex; gap: 12px; align-items: flex-start; padding: 11px 14px; border-radius: var(--radius-md); border-left: 3px solid; background: var(--color-paper); font-size: 14px; line-height: 1.55; }
  .alert .title { font-weight: 700; color: var(--color-ink); }
  .alert .body  { color: var(--color-ink-soft); }
  .alert .icon  { flex-shrink: 0; margin-top: 1px; }
  .s { background: var(--color-success-bg); border-color: var(--color-success); color: var(--color-success); }
  .w { background: var(--color-warning-bg); border-color: var(--color-warning); color: var(--color-warning); }
  .d { background: var(--color-danger-bg);  border-color: var(--color-danger);  color: var(--color-danger); }
  .i { background: var(--color-info-bg);    border-color: var(--color-info);    color: var(--color-info); }
</style>
</head>
<body>
  <div class="alert s">
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    <div><span class="title">同步完成。</span> <span class="body">向 WordPress 推送了 3 篇文章。</span></div>
  </div>
  <div class="alert w">
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
    <div><span class="title">token 余额不足。</span> <span class="body">本月剩 240 tokens，可能不足以再生成一份 PDF。</span></div>
  </div>
  <div class="alert d">
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
    <div><span class="title">导出失败。</span> <span class="body">浏览器渲染服务返回 524，重试 1 次后仍超时。</span></div>
  </div>
  <div class="alert i">
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    <div><span class="title">新版本可用。</span> <span class="body">v0.8.4 修复了 OG 图体积过大导致的 WhatsApp 预览失败。</span></div>
  </div>
</body>
</html>
