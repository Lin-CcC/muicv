<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>AI Chatbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--color-cream); font-family: var(--font-sans); color: var(--color-ink); }
  .chat { max-width: 660px; }
  .msg { display: grid; grid-template-columns: 32px 1fr; gap: 12px; margin-bottom: 16px; }
  .ava { width: 32px; height: 32px; border-radius: var(--radius-md); display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: var(--color-ink); background: var(--color-corgi); }
  .ava.user { background: var(--color-paper-deep); }
  .body { min-width: 0; }
  .head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .who { font-weight: 800; font-size: 14px; }
  .who.ai { color: var(--color-yellow-deep); }
  .when { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); }
  .text { font-size: 16px; line-height: 1.6; color: var(--color-ink-soft); }
  .text strong { color: var(--color-ink); font-weight: 700; }

  /* Inline tool-call card */
  .tool { margin-top: 8px; padding: 10px 14px; border: 1px solid var(--color-rule-strong); border-radius: var(--radius-md); background: var(--color-paper); font-size: 14px; }
  .tool .top { display: flex; align-items: center; gap: 8px; }
  .tool .name { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--color-ink); }
  .tool .ok { margin-left: auto; font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--color-success); display: inline-flex; align-items: center; gap: 4px; }
  .tool .out { margin-top: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); padding-left: 22px; }
  .tool svg { color: var(--color-yellow-deep); }

  /* Thinking pulse */
  .thinking { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; background: var(--color-fluff); color: var(--color-yellow-deep); font-size: 12px; font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-mono); }
  .dots span { display: inline-block; width: 6px; height: 6px; border-radius: 999px; background: currentColor; animation: pulse 1.2s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.3 } 50% { opacity: 1 } }

  /* Composer */
  .composer { border: 2px solid var(--color-ink); border-radius: var(--radius-lg); background: var(--color-cream); padding: 10px 12px; box-shadow: 0 2px 0 0 var(--color-ink); }
  .composer textarea { width: 100%; box-sizing: border-box; border: 0; background: transparent; resize: none; font: inherit; font-size: 16px; color: var(--color-ink); outline: none; min-height: 44px; line-height: 1.5; }
  .composer textarea::placeholder { color: var(--color-mute); }
  .crow { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .clip { width: 30px; height: 30px; border-radius: var(--radius-sm); border: 0; background: transparent; color: var(--color-mute); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .clip:hover { background: var(--color-fluff); color: var(--color-ink); }
  .model { font-family: var(--font-mono); font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm); background: var(--color-paper); color: var(--color-ink-soft); border: 1px solid var(--color-rule); font-weight: 600; }
  .send { margin-left: auto; padding: 6px 16px; border-radius: var(--radius-md); border: 2px solid var(--color-ink); background: var(--color-yellow); color: var(--color-ink); font: inherit; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 2px 0 0 var(--color-yellow-deep); display: inline-flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<div class="chat">
  <div class="msg">
    <div class="ava user">M</div>
    <div class="body">
      <div class="head"><span class="who">Meathill</span><span class="when">2m</span></div>
      <div class="text">帮我把"重构发布链路"那段经历改写成更适合投 SSR 的版本。</div>
    </div>
  </div>

  <div class="msg">
    <div class="ava"><img src="../assets/mui-mascot.png" width="22" height="22" alt=""></div>
    <div class="body">
      <div class="head"><span class="who ai">Mui</span><span class="when">2m · claude-sonnet-4.5</span></div>
      <div class="text">好的。我先把你已有的素材调出来对一下措辞。</div>
      <div class="tool">
        <div class="top">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
          <span class="name">read_material</span>
          <span class="ok">✓ 已读取</span>
        </div>
        <div class="out">experience/refactor-release.md · 1.2 KB</div>
      </div>
      <div style="margin-top: 10px;"><span class="thinking">分析素材<span class="dots"><span></span><span></span><span></span></span></span></div>
    </div>
  </div>
</div>

<div class="composer" style="margin-top: 4px;">
  <textarea placeholder="给 Mui 一个目标岗位 / 经历 / 问题…"></textarea>
  <div class="crow">
    <button class="clip" title="附件"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.4 11.05-9.18 9.18a6 6 0 0 1-8.49-8.49l9.19-9.18a4 4 0 1 1 5.66 5.65l-9.2 9.18a2 2 0 0 1-2.82-2.82l8.48-8.49"/></svg></button>
    <span class="model">claude-sonnet-4.5</span>
    <span style="font-family: var(--font-mono); font-size: 12px; color: var(--color-mute);">⌘↵ 发送 · ⌘K 切换模型</span>
    <button class="send">发送
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
    </button>
  </div>
</div>
</body>
</html>
