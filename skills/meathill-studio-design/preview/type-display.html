<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Type — Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-cream); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px dashed var(--color-rule); }
  .row:last-child { border: 0; }
  .tag { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); min-width: 96px; flex-shrink: 0; text-transform: uppercase; letter-spacing: var(--tracking-mono); }
  .sample { color: var(--color-ink); }
</style>
</head>
<body>
  <div class="row"><span class="tag">hero · 800</span><span class="sample display" style="font-size: 48px">把它交给 Mui</span></div>
  <div class="row"><span class="tag">display · 800</span><span class="sample display" style="font-size: 36px">先把素材理顺</span></div>
  <div class="row"><span class="tag">italic · 700</span><span class="sample display display-italic" style="font-size: 28px; font-weight: 700">再处理投递</span></div>
  <div class="row"><span class="tag">serif · 500</span><span class="sample" style="font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--color-ink-soft)">"Fraunces 给暖色页面一个文化感的落点。"</span></div>
</body>
</html>
