<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Cards — Press vs Soft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--color-cream); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .press-card { border: 2px solid var(--color-ink); background: var(--color-cream); border-radius: var(--radius-lg); padding: 16px; box-shadow: 0 4px 0 0 var(--color-ink); }
  .soft-card  { border: 1px solid var(--color-rule-strong); background: var(--color-paper); border-radius: var(--radius-md); padding: 14px; box-shadow: var(--shadow-sm); }
  h4 { font-size: 18px; font-weight: 800; margin: 0 0 4px; color: var(--color-ink); }
  p  { font-size: 14px; line-height: 1.6; color: var(--color-ink-soft); margin: 0; }
  .meta { display: flex; gap: 14px; margin-top: 10px; font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 999px; background: var(--color-fluff); color: var(--color-yellow-deep); font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="press-card">
    <span class="pill">已上线</span>
    <h4>整理职业素材</h4>
    <p>把现有简历、项目经历、技能和亮点拆成可复用素材。以后每次投递都从同一份底稿出发。</p>
    <div class="meta"><span>marketing · hero · callout</span></div>
  </div>
  <div class="soft-card">
    <h4 style="font-size: 16px">关于 OG 图体积红线</h4>
    <p>WhatsApp &lt; 300KB（严格），Twitter / X &lt; 5MB，Facebook &lt; 8MB。按 WhatsApp 卡线就够了。</p>
    <div class="meta"><span>📅 2026-04-12</span><span>⏱ 5 分钟</span><span>👁 1.2k</span></div>
  </div>
</body>
</html>
