<!doctype html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Dark mode — palette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--color-cream); display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 60px; border-radius: var(--radius-md); border: 1px solid var(--color-rule); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 700; color: var(--color-ink); }
  .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--color-mute); }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background: var(--color-cream)"></div><div class="name">cream</div><div class="hex">page</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-paper)"></div><div class="name">paper</div><div class="hex">card</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-paper-deep)"></div><div class="name">paper-deep</div><div class="hex">selected</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-fluff)"></div><div class="name">fluff</div><div class="hex">pill bg</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-corgi)"></div><div class="name">corgi</div><div class="hex">#f3c574</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-yellow)"></div><div class="name">yellow</div><div class="hex">#ecc94a</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-yellow-deep)"></div><div class="name">yellow-deep</div><div class="hex">accent</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-tongue)"></div><div class="name">tongue</div><div class="hex">danger</div></div>
</body>
</html>
