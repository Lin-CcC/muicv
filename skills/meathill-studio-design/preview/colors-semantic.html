<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Colors — Semantic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--color-cream); display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .pair { display: flex; flex-direction: column; gap: 6px; }
  .bg { padding: 10px 12px; border-radius: var(--radius-md); border: 1px solid; font-family: var(--font-sans); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
  .dot { width: 14px; height: 14px; border-radius: 999px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 700; color: var(--color-ink); }
</style>
</head>
<body>
  <div class="pair">
    <div class="bg" style="background: var(--color-success-bg); color: var(--color-success); border-color: color-mix(in srgb, var(--color-success) 30%, transparent)">success<span class="dot" style="background: var(--color-success)"></span></div>
    <div class="name">success</div><div class="hex">#4f8a3a · bg #e7eed1</div>
  </div>
  <div class="pair">
    <div class="bg" style="background: var(--color-warning-bg); color: var(--color-warning); border-color: color-mix(in srgb, var(--color-warning) 35%, transparent)">warning<span class="dot" style="background: var(--color-warning)"></span></div>
    <div class="name">warning</div><div class="hex">#c9892b · bg #f9ecc6</div>
  </div>
  <div class="pair">
    <div class="bg" style="background: var(--color-danger-bg); color: var(--color-danger); border-color: color-mix(in srgb, var(--color-danger) 30%, transparent)">danger<span class="dot" style="background: var(--color-danger)"></span></div>
    <div class="name">danger</div><div class="hex">#c44a32 · bg #fadfd5</div>
  </div>
  <div class="pair">
    <div class="bg" style="background: var(--color-info-bg); color: var(--color-info); border-color: color-mix(in srgb, var(--color-info) 30%, transparent)">info<span class="dot" style="background: var(--color-info)"></span></div>
    <div class="name">info</div><div class="hex">#3b6f9a · bg #dceaf4</div>
  </div>
</body>
</html>
