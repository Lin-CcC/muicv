<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Shadows — Press + Soft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 22px; background: var(--color-cream); display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .chip { width: 130px; height: 56px; background: var(--color-cream); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-sans); font-weight: 700; color: var(--color-ink); font-size: 14px; }
  .ink-border { border: 2px solid var(--color-ink); }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); text-transform: uppercase; letter-spacing: var(--tracking-mono); }
  .yellow { background: var(--color-yellow); }
</style>
</head>
<body>
  <div class="sw"><div class="chip ink-border yellow" style="box-shadow: var(--shadow-press-yellow)">press · yellow</div><div class="name">3px solid yellow-deep</div></div>
  <div class="sw"><div class="chip ink-border" style="box-shadow: var(--shadow-press-ink)">press · ink</div><div class="name">3px solid ink</div></div>
  <div class="sw"><div class="chip" style="box-shadow: var(--shadow-sm); border: 1px solid var(--color-rule-strong)">soft · sm</div><div class="name">--shadow-sm</div></div>
  <div class="sw"><div class="chip" style="box-shadow: var(--shadow-md); border: 1px solid var(--color-rule-strong)">soft · md</div><div class="name">--shadow-md</div></div>
</body>
</html>
