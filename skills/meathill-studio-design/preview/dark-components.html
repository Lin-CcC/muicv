<!doctype html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Dark mode — components in use</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--color-cream); font-family: var(--font-sans); color: var(--color-ink); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .press-card { border: 2px solid var(--color-ink-line); background: var(--color-paper); border-radius: var(--radius-lg); padding: 16px; box-shadow: 0 4px 0 0 var(--color-ink-line); }
  .soft-card  { border: 1px solid var(--color-rule-strong); background: var(--color-paper); border-radius: var(--radius-md); padding: 14px; box-shadow: var(--shadow-sm); }
  h4 { font-size: 18px; font-weight: 800; margin: 0 0 4px; color: var(--color-ink); }
  p  { font-size: 14px; line-height: 1.6; color: var(--color-ink-soft); margin: 0; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 10px; border-radius: 999px; background: var(--color-fluff); color: var(--color-yellow-deep); font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--color-yellow-deep); }
  .meta { display: flex; gap: 14px; margin-top: 10px; font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); }

  /* buttons row */
  .btns { display: flex; gap: 10px; flex-wrap: wrap; grid-column: 1 / -1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-md); border: 2px solid var(--color-ink-line); background: var(--color-yellow); color: #1a1410; font: inherit; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: var(--shadow-press-yellow); }
  .btn-ink { background: var(--color-paper); color: var(--color-ink); box-shadow: var(--shadow-press-ink); }
  .btn-ghost { background: transparent; border-color: transparent; box-shadow: none; color: var(--color-ink-soft); font-weight: 600; }

  /* input */
  .ipt { padding: 8px 12px; border: 1px solid var(--color-rule-strong); border-radius: var(--radius-md); background: rgb(0 0 0 / 0.2); font: inherit; font-size: 14px; color: var(--color-ink); width: 100%; box-sizing: border-box; }
  .ipt:focus { outline: none; border-color: var(--color-yellow); box-shadow: var(--focus-ring); }
  .form-card { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 12px 14px; background: var(--color-paper); border-radius: var(--radius-md); border: 1px solid var(--color-rule-strong); }
</style>
</head>
<body>
  <div class="press-card">
    <span class="pill"><span class="dot"></span>已上线</span>
    <h4>整理职业素材</h4>
    <p>把现有简历、项目经历、技能拆成可复用素材。以后每次投递都从同一份底稿出发。</p>
  </div>
  <div class="soft-card">
    <h4 style="font-size: 16px;">关于 OG 图体积红线</h4>
    <p>WhatsApp &lt; 300KB（严格），Twitter / X &lt; 5MB，按 WhatsApp 卡线就够了。</p>
    <div class="meta"><span>📅 2026-04-12</span><span>⏱ 5 分钟</span><span>👁 1.2k</span></div>
  </div>

  <div class="btns">
    <button class="btn">主操作</button>
    <button class="btn btn-ink">次操作</button>
    <button class="btn btn-ghost">取消</button>
    <span class="pill"><span class="dot"></span>PRO</span>
    <span class="pill" style="background: var(--color-success-bg); color: #b8d878;"><span class="dot" style="background: #b8d878;"></span>同步成功</span>
    <span class="pill" style="background: var(--color-danger-bg); color: var(--color-tongue);"><span class="dot" style="background: var(--color-tongue);"></span>导出失败</span>
  </div>

  <div class="form-card">
    <input class="ipt" placeholder="搜索素材、岗位、设置…">
    <button class="btn" style="padding: 6px 14px;">搜索</button>
  </div>
</body>
</html>
