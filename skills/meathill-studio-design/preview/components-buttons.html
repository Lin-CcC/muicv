<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--color-cream); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-sans); font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border-radius: var(--radius-md); padding: 8px 16px; font-size: 14px; border: 2px solid transparent; line-height: 1; transition: background var(--t-fast); }
  .btn-primary { background: var(--color-yellow); color: var(--color-ink); border-color: var(--color-ink); }
  .btn-ink     { background: var(--color-cream); color: var(--color-ink); border-color: var(--color-ink); }
  .btn-ghost   { background: transparent; color: var(--color-ink); border-color: transparent; padding: 8px 12px; }
  .btn-ghost:hover { background: var(--color-fluff); }
  .btn-danger  { background: var(--color-danger); color: #fff; border-color: color-mix(in srgb, var(--color-danger) 70%, black); }
  .btn-link    { background: transparent; border: 0; color: var(--color-yellow-deep); text-decoration: underline; text-decoration-color: var(--color-corgi); text-decoration-thickness: 2px; padding: 4px 0; }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm); }
  .btn-lg { padding: 11px 20px; font-size: 16px; }
  .arrow { width: 14px; height: 14px; display: inline-block; }
  .label { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); min-width: 84px; text-transform: uppercase; letter-spacing: var(--tracking-mono); }
</style>
</head>
<body>
  <div class="row">
    <span class="label">primary</span>
    <button class="btn btn-primary press">下载桌面 app
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M17 7H8M17 7v9"/></svg>
    </button>
    <button class="btn btn-ink press-ink">看 3 步怎么开始</button>
    <button class="btn btn-link">已有账号？登录</button>
  </div>
  <div class="row">
    <span class="label">danger</span>
    <button class="btn btn-danger">删除项目</button>
    <button class="btn btn-ghost">取消</button>
  </div>
  <div class="row">
    <span class="label">sizes</span>
    <button class="btn btn-primary btn-sm press">小</button>
    <button class="btn btn-primary press">中</button>
    <button class="btn btn-primary btn-lg press">大 / Hero</button>
  </div>
</body>
</html>
