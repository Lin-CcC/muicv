<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--color-cream); display: flex; flex-direction: column; gap: 7px; }
  .row { display: grid; grid-template-columns: 64px 64px 1fr; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); }
  .bar { height: 14px; background: var(--color-corgi); border-radius: 2px; }
  .px { color: var(--color-ink); font-weight: 600; }
</style>
</head>
<body>
  <div class="row"><span>space-1</span><span class="px">4px</span><div class="bar" style="width: 4px"></div></div>
  <div class="row"><span>space-2</span><span class="px">8px</span><div class="bar" style="width: 8px"></div></div>
  <div class="row"><span>space-3</span><span class="px">12px</span><div class="bar" style="width: 12px"></div></div>
  <div class="row"><span>space-4</span><span class="px">16px</span><div class="bar" style="width: 16px"></div></div>
  <div class="row"><span>space-5</span><span class="px">20px</span><div class="bar" style="width: 20px"></div></div>
  <div class="row"><span>space-6</span><span class="px">24px</span><div class="bar" style="width: 24px"></div></div>
  <div class="row"><span>space-7</span><span class="px">32px</span><div class="bar" style="width: 32px"></div></div>
  <div class="row"><span>space-8</span><span class="px">40px</span><div class="bar" style="width: 40px"></div></div>
  <div class="row"><span>space-9</span><span class="px">56px</span><div class="bar" style="width: 56px"></div></div>
  <div class="row"><span>space-10</span><span class="px">72px</span><div class="bar" style="width: 72px"></div></div>
</body>
</html>
