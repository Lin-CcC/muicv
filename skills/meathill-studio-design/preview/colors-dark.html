<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Colors — Dark Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #1a1410; }
  body { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; padding: 1px; }
  .panel { padding: 16px 18px; }
  .light { background: var(--color-cream); color: var(--color-ink); }
  .dark  { background: #1a1410; }
  .dark .inner { /* trigger dark vars */ }
  .label { font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-mono); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .light .label { color: #8a7660; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; gap: 3px; }
  .chip { height: 52px; border-radius: 6px; border: 1px solid; }
  .name { font-family: var(--font-sans); font-size: 11px; font-weight: 700; }
  .hex { font-family: var(--font-mono); font-size: 10px; }
</style>
</head>
<body>
  <!-- LIGHT panel (default tokens) -->
  <div class="panel light">
    <div class="label"><span style="display:inline-block;width:10px;height:10px;border-radius:999px;background:#fdfaf2;border:1px solid #c9b790;"></span>Light</div>
    <div class="grid">
      <div class="sw"><div class="chip" style="background:#fdfaf2;border-color:#c9b790"></div><div class="name" style="color:#3a2e23">cream</div><div class="hex" style="color:#8a7660">#fdfaf2</div></div>
      <div class="sw"><div class="chip" style="background:#f6efde;border-color:#c9b790"></div><div class="name" style="color:#3a2e23">paper</div><div class="hex" style="color:#8a7660">#f6efde</div></div>
      <div class="sw"><div class="chip" style="background:#3a2e23;border-color:#3a2e23"></div><div class="name" style="color:#3a2e23">ink</div><div class="hex" style="color:#8a7660">#3a2e23</div></div>
      <div class="sw"><div class="chip" style="background:#e6c34a;border-color:#b3851c"></div><div class="name" style="color:#3a2e23">yellow</div><div class="hex" style="color:#8a7660">#e6c34a</div></div>
      <div class="sw"><div class="chip" style="background:#fbf1d8;border-color:#c9b790"></div><div class="name" style="color:#3a2e23">fluff</div><div class="hex" style="color:#8a7660">#fbf1d8</div></div>
      <div class="sw"><div class="chip" style="background:#f3c574;border-color:#b3851c"></div><div class="name" style="color:#3a2e23">corgi</div><div class="hex" style="color:#8a7660">#f3c574</div></div>
      <div class="sw"><div class="chip" style="background:#b3851c;border-color:#3a2e23"></div><div class="name" style="color:#3a2e23">y-deep</div><div class="hex" style="color:#8a7660">#b3851c</div></div>
      <div class="sw"><div class="chip" style="background:#d8694e;border-color:#3a2e23"></div><div class="name" style="color:#3a2e23">tongue</div><div class="hex" style="color:#8a7660">#d8694e</div></div>
    </div>
  </div>

  <!-- DARK panel (apply data-theme via wrapper) -->
  <div data-theme="dark" class="panel" style="background: var(--color-cream); color: var(--color-ink);">
    <div class="label" style="color: var(--color-mute);"><span style="display:inline-block;width:10px;height:10px;border-radius:999px;background:#1a1410;border:1px solid rgb(243 233 213 / 0.3);"></span>Dark</div>
    <div class="grid">
      <div class="sw"><div class="chip" style="background:var(--color-cream);border-color:var(--color-rule-strong)"></div><div class="name" style="color:var(--color-ink)">cream</div><div class="hex" style="color:var(--color-mute)">#1a1410</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-paper);border-color:var(--color-rule-strong)"></div><div class="name" style="color:var(--color-ink)">paper</div><div class="hex" style="color:var(--color-mute)">#231b14</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-ink);border-color:var(--color-rule-strong)"></div><div class="name" style="color:var(--color-ink)">ink</div><div class="hex" style="color:var(--color-mute)">#f3e9d5</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-yellow);border-color:var(--color-yellow-deep)"></div><div class="name" style="color:var(--color-ink)">yellow</div><div class="hex" style="color:var(--color-mute)">#ecc94a</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-fluff);border-color:var(--color-rule-strong)"></div><div class="name" style="color:var(--color-ink)">fluff</div><div class="hex" style="color:var(--color-mute)">#38291a</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-corgi);border-color:var(--color-yellow-deep)"></div><div class="name" style="color:var(--color-ink)">corgi</div><div class="hex" style="color:var(--color-mute)">#f3c574</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-yellow-deep);border-color:var(--color-yellow)"></div><div class="name" style="color:var(--color-ink)">y-deep</div><div class="hex" style="color:var(--color-mute)">#e6b240</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-tongue);border-color:var(--color-yellow-deep)"></div><div class="name" style="color:var(--color-ink)">tongue</div><div class="hex" style="color:var(--color-mute)">#e8775a</div></div>
    </div>
  </div>
</body>
</html>
