<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--color-cream); display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .chip { width: 68px; height: 68px; background: var(--color-corgi); border: 2px solid var(--color-ink); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 700; color: var(--color-ink); }
  .px { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="border-radius: var(--radius-xs)"></div><div class="name">xs</div><div class="px">3px</div></div>
  <div class="sw"><div class="chip" style="border-radius: var(--radius-sm)"></div><div class="name">sm</div><div class="px">4px</div></div>
  <div class="sw"><div class="chip" style="border-radius: var(--radius)"></div><div class="name">base</div><div class="px">6px</div></div>
  <div class="sw"><div class="chip" style="border-radius: var(--radius-md)"></div><div class="name">md</div><div class="px">8px</div></div>
  <div class="sw"><div class="chip" style="border-radius: var(--radius-lg)"></div><div class="name">lg</div><div class="px">10px</div></div>
  <div class="sw"><div class="chip" style="border-radius: var(--radius-xl)"></div><div class="name">xl</div><div class="px">14px</div></div>
  <div class="sw"><div class="chip" style="border-radius: var(--radius-full)"></div><div class="name">full</div><div class="px">pill</div></div>
</body>
</html>
