<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Type — Body</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--color-cream); }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 6px 0; border-bottom: 1px dashed var(--color-rule); }
  .row:last-child { border: 0; }
  .tag { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); min-width: 108px; flex-shrink: 0; text-transform: uppercase; letter-spacing: var(--tracking-mono); }
  .sample { color: var(--color-ink); font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="row"><span class="tag">h1 · 36/800</span><span class="sample" style="font-size: 36px; font-weight: 800; letter-spacing: -0.02em">想问的大概率在这里</span></div>
  <div class="row"><span class="tag">h2 · 30/800</span><span class="sample" style="font-size: 30px; font-weight: 800; letter-spacing: -0.018em">桌面 app 已上线</span></div>
  <div class="row"><span class="tag">h3 · 24/800</span><span class="sample" style="font-size: 24px; font-weight: 800">整理职业素材</span></div>
  <div class="row"><span class="tag">h4 · 20/700</span><span class="sample" style="font-size: 20px; font-weight: 700">设置与偏好</span></div>
  <div class="row"><span class="tag">body · 16/400</span><span class="sample" style="font-size: 16px; color: var(--color-ink-soft); line-height: 1.6">默认正文：16px Nunito，行高 1.6，颜色 ink-soft。</span></div>
  <div class="row"><span class="tag">ui · 14/500</span><span class="sample" style="font-size: 14px; font-weight: 500">UI 文本默认 14px / 500，配合紧凑控件高度。</span></div>
  <div class="row"><span class="tag">meta · 12/400</span><span class="sample muted" style="font-size: 12px">最小档：12px，用于时间戳、计数、辅助说明</span></div>
</body>
</html>
