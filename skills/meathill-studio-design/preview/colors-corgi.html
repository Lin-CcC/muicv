<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Colors — Corgi Yellow Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--color-cream); display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 72px; border-radius: var(--radius-md); border: 1px solid var(--color-rule-strong); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 700; color: var(--color-ink); }
  .hex  { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background: var(--color-fluff)"></div><div class="name">fluff</div><div class="hex">#fbf1d8</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-corgi)"></div><div class="name">corgi</div><div class="hex">#f3c574</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-yellow)"></div><div class="name">yellow</div><div class="hex">#e6c34a</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-yellow-warm)"></div><div class="name">yellow-warm</div><div class="hex">#e6a23a</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-yellow-deep)"></div><div class="name">yellow-deep</div><div class="hex">#b3851c</div></div>
  <div class="sw"><div class="chip" style="background: var(--color-tongue)"></div><div class="name">tongue</div><div class="hex">#d8694e</div></div>
</body>
</html>
