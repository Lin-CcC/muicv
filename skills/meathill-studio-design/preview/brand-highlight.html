<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Brand — Highlight & Decor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800&family=Nunito:wght@500;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--color-cream); display: flex; flex-direction: column; gap: 16px; align-items: flex-start; }
  .label { font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); text-transform: uppercase; letter-spacing: var(--tracking-mono); }
  .h { font-family: var(--font-display); font-weight: 800; color: var(--color-ink); letter-spacing: -0.02em; font-size: 30px; line-height: 1.1; margin: 0; }
  .row { display: flex; gap: 18px; align-items: center; }
  .paw { width: 22px; height: 22px; color: var(--color-yellow-deep); }
  .star { width: 16px; height: 16px; color: var(--color-yellow); }
</style>
</head>
<body>
  <div>
    <div class="label">— marker highlight</div>
    <h2 class="h">先把素材<span class="highlight">理顺</span>，再处理投递。</h2>
  </div>
  <div class="row">
    <div class="label">— decor</div>
    <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><ellipse cx="6" cy="9" rx="1.8" ry="2.4"/><ellipse cx="10.5" cy="6" rx="1.8" ry="2.4"/><ellipse cx="13.5" cy="6" rx="1.8" ry="2.4"/><ellipse cx="18" cy="9" rx="1.8" ry="2.4"/><path d="M12 11c-3 0-5 2.5-5 5 0 1.8 1.5 3 3.2 3 .8 0 1.2-.4 1.8-.4s1 .4 1.8.4c1.7 0 3.2-1.2 3.2-3 0-2.5-2-5-5-5z"/></svg>
    <svg class="paw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="6" cy="9" rx="1.8" ry="2.4"/><ellipse cx="10.5" cy="6" rx="1.8" ry="2.4"/><ellipse cx="13.5" cy="6" rx="1.8" ry="2.4"/><ellipse cx="18" cy="9" rx="1.8" ry="2.4"/><path d="M12 11c-3 0-5 2.5-5 5 0 1.8 1.5 3 3.2 3 .8 0 1.2-.4 1.8-.4s1 .4 1.8.4c1.7 0 3.2-1.2 3.2-3 0-2.5-2-5-5-5z"/></svg>
    <svg class="star wiggle" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L13.6 9.4 L21 12 L13.6 14.6 L12 22 L10.4 14.6 L3 12 L10.4 9.4 Z"/></svg>
    <span style="font-family: var(--font-mono); font-size: 12px; color: var(--color-mute); text-transform: uppercase; letter-spacing: 0.18em;"><span style="display: inline-block; vertical-align: middle; color: var(--color-yellow-deep); margin-right: 4px;">— </span>由柯基 Mui 监修</span>
  </div>
</body>
</html>
