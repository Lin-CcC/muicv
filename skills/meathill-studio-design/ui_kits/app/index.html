<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meathill Studio — Mui简历 mobile</title>

<link rel="icon" href="../../assets/mui-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="app.css">

<style>
  body { margin: 0; min-height: 100vh; padding: 32px 0; background:
    radial-gradient(ellipse 60% 50% at 80% 0%, rgb(243 197 116 / 0.35) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 100%, rgb(251 241 216 / 0.5) 0%, transparent 50%),
    var(--color-cream);
    background-image: radial-gradient(circle, rgb(58 46 35 / 0.05) 1.2px, transparent 1.2px);
    background-size: 24px 24px;
    background-color: var(--color-cream);
    display: flex; align-items: flex-start; justify-content: center;
    font-family: var(--font-sans);
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Chat.jsx"></script>
<script type="text/babel" src="Editor.jsx"></script>
<script type="text/babel" src="Settings.jsx"></script>
<script type="text/babel" src="TabBar.jsx"></script>

<script type="text/babel">
  const { useState } = React;
  function MobileApp() {
    const [section, setSection] = useState('home');
    let screen;
    if (section === 'home')     screen = <ScreenHome go={setSection} />;
    else if (section === 'chat')   screen = <ScreenChat />;
    else if (section === 'editor') screen = <ScreenEditor />;
    else                            screen = <ScreenSettings />;

    return (
      <IOSDevice width={402} height={874}>
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%', width: '100%', minWidth: 0 }}>
          <div style={{ flex: 1, minHeight: 0, minWidth: 0, display: 'flex' }}>{screen}</div>
          <TabBar active={section} onChange={setSection} />
        </div>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp />);
</script>
</body>
</html>
