name: Build whisper-engine plugin

# 独立 build / release whisper.cpp CLI 二进制（issue #1 M3）。
#
# 为什么独立 workflow：
#   1. 主 app .app bundle 不带 whisper.cpp 二进制（主 app 体积不变；用户用到才下载）
#   2. whisper.cpp 升版独立于主 app 升版（whisper.cpp ~1-2 月一发，不绑死 Electron 升版）
#   3. CI 只在手动 dispatch 时跑（whisper-cli 二进制基本稳定，不用每次 push 都 build）
#
# 触发：仅 workflow_dispatch。inputs 决定 upstream tag + 自家 release tag。
# 产物上传到独立 GitHub Release tag `whisper-engine-vX.Y.Z`，跟主 app `vX.Y.Z` 解耦。

on:
  workflow_dispatch:
    inputs:
      whisper_version:
        description: 'whisper.cpp upstream git tag'
        default: 'v1.8.4'
        required: true
      engine_version:
        description: 'muicv whisper-engine release tag suffix（语义版本，不含前缀）'
        default: '1.0.0'
        required: true

permissions:
  contents: write

concurrency:
  group: whisper-engine-${{ inputs.engine_version }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create release placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Create / ensure release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: whisper-engine-v${{ inputs.engine_version }}
          name: whisper-engine v${{ inputs.engine_version }}
          draft: false
          body: |
            whisper.cpp `${{ inputs.whisper_version }}` 预编译产物，给 Mui简历桌面 app 的本地转写引擎用。

            - `whisper-engine-darwin-arm64.tar.gz` —— Apple Silicon，已 Developer ID 签名 + Apple notarized
            - `whisper-engine-darwin-x64.tar.gz` —— Intel Mac，已 Developer ID 签名 + Apple notarized
            - `whisper-engine-linux-x64.tar.gz` —— Linux x86_64
            - `whisper-engine-win-x64.tar.gz` —— Windows x86_64（tar.gz 是因为 Windows 10+ 的 tar.exe 原生支持，让 app 端解压逻辑跨平台统一）

            模型（ggml-base / ggml-small / ggml-medium）由 app 端按需从 HuggingFace 下载，不在本 release。

  build:
    name: Build whisper-cli (${{ matrix.target }})
    needs: [create-release]
    if: ${{ !cancelled() }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win-x64

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v6
        with:
          repository: ggml-org/whisper.cpp
          ref: ${{ inputs.whisper_version }}
          path: whisper.cpp

      # GGML_NATIVE=OFF：禁用 -march=native，避免编出来的二进制依赖 runner CPU 才有的指令集
      # （runner 通常是 Intel/AMD with AVX2，用户 CPU 可能更老），让产物在通用 x86_64 / arm64 上跑
      # macOS：Metal 默认 ON，shader 内嵌进 binary（GGML_METAL_EMBED_LIBRARY 默认开），自包含
      - name: Configure & build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: whisper.cpp
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_NATIVE=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_TESTS=OFF
          cmake --build build --config Release -j --target whisper-cli
          ls -lah build/bin/

      - name: Configure & build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: whisper.cpp
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_NATIVE=OFF `
            -DWHISPER_BUILD_EXAMPLES=ON `
            -DWHISPER_BUILD_TESTS=OFF
          cmake --build build --config Release -j --target whisper-cli
          Get-ChildItem -Recurse build/bin

      # macOS: Developer ID 签名 + hardened runtime + Apple notarization
      # 复用 release.yml 同一组 secrets。standalone CLI 不能 stapler staple
      # （staple 只支持 .app/.pkg/.dmg），所以 notarize 后用户首次运行时 macOS
      # 在线查 ticket。但我们 app 用 fetch 下载，下载的文件**没有** com.apple.quarantine
      # 扩展属性（fetch 不走 LaunchServices）→ Gatekeeper 不会触发，不需要 stapler。
      # 即便如此还是签 + notarize：留可追溯性 + 防未来 macOS 收紧策略。
      - name: Codesign + notarize (mac only)
        if: startsWith(matrix.target, 'darwin-')
        shell: bash
        env:
          CSC_LINK_B64: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          BINARY="whisper.cpp/build/bin/whisper-cli"
          [ -f "$BINARY" ] || { echo "::error::whisper-cli 没编出来：$BINARY"; ls -la whisper.cpp/build/bin/; exit 1; }

          mkdir -p "$RUNNER_TEMP/apple"
          P12="$RUNNER_TEMP/apple/cert.p12"
          P8="$RUNNER_TEMP/apple/AuthKey.p8"
          printf '%s' "$CSC_LINK_B64" | base64 --decode > "$P12"
          printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$P8"

          KEYCHAIN="$RUNNER_TEMP/apple/build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import "$P12" -P "$CSC_KEY_PASSWORD" -k "$KEYCHAIN" -A -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          [ -n "$IDENTITY" ] || { echo "::error::Developer ID Application identity 没找到"; exit 1; }
          echo "Signing with: $IDENTITY"

          codesign --force \
            --sign "$IDENTITY" \
            --options runtime \
            --timestamp \
            --keychain "$KEYCHAIN" \
            "$BINARY"
          codesign --verify --strict "$BINARY"
          echo "✓ codesign OK"

          ZIP="$RUNNER_TEMP/whisper-cli-notarize.zip"
          ditto -c -k --keepParent "$BINARY" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$P8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 20m
          echo "✓ notarize OK"

          security delete-keychain "$KEYCHAIN" 2>/dev/null || true

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p out
          # 把二进制 + LICENSE 一起打包，方便 audit
          cp whisper.cpp/build/bin/whisper-cli out/
          cp whisper.cpp/LICENSE out/LICENSE.whisper-cpp
          chmod +x out/whisper-cli
          cd out
          tar -czf "whisper-engine-${{ matrix.target }}.tar.gz" whisper-cli LICENSE.whisper-cpp
          # sha256 校验码
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shasum -a 256 "whisper-engine-${{ matrix.target }}.tar.gz" > "whisper-engine-${{ matrix.target }}.tar.gz.sha256"
          else
            sha256sum "whisper-engine-${{ matrix.target }}.tar.gz" > "whisper-engine-${{ matrix.target }}.tar.gz.sha256"
          fi
          ls -lah

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          # MSBuild multi-config 把产物放在 build/bin/Release/
          $bin = if (Test-Path "whisper.cpp/build/bin/Release/whisper-cli.exe") {
            "whisper.cpp/build/bin/Release/whisper-cli.exe"
          } else {
            "whisper.cpp/build/bin/whisper-cli.exe"
          }
          Copy-Item $bin out/
          Copy-Item whisper.cpp/LICENSE out/LICENSE.whisper-cpp
          # Windows 10+ tar.exe 自带（来自 BSD tar），打 .tar.gz 让 app 端解压逻辑跨平台统一
          tar -czf "out/whisper-engine-${{ matrix.target }}.tar.gz" -C out whisper-cli.exe LICENSE.whisper-cpp
          $hash = Get-FileHash "out/whisper-engine-${{ matrix.target }}.tar.gz" -Algorithm SHA256
          "$($hash.Hash.ToLower())  whisper-engine-${{ matrix.target }}.tar.gz" | Out-File -Encoding ASCII "out/whisper-engine-${{ matrix.target }}.tar.gz.sha256"
          Get-ChildItem out

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: whisper-engine-v${{ inputs.engine_version }}
          files: |
            out/whisper-engine-${{ matrix.target }}.tar.gz
            out/whisper-engine-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: false
