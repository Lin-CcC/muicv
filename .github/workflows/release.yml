name: Release Mui简历 desktop app

# 触发：
#   1) push tag 形如 v0.1.0 / v1.2.3 → 构建并 upload 到对应 GitHub Release
#   2) workflow_dispatch → 手动跑（用于自测；不会创建 release）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 同时只跑一份 build，避免并发抢同一个 release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 先把 release 创出来，notes 一次性由 GH 自动生成
  # （否则 matrix 三个 build job 各调一次 action-gh-release，会把 changelog
  # 重复 append 三次）
  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release with auto notes
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true

  build:
    name: Build & package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # !cancelled() 让 workflow_dispatch 时（create-release 被 if 跳过）
    # build 仍能跑；tag push 时如果 create-release 失败这里也会 skip
    needs: [create-release]
    if: ${{ !cancelled() }}

    permissions:
      contents: write # 创建 / 上传 release

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifacts: |
              packages/app/release/*.dmg
              packages/app/release/*.zip
              packages/app/release/latest-mac.yml
          - os: windows-latest
            target: win
            artifacts: |
              packages/app/release/*.exe
              packages/app/release/*.exe.blockmap
              packages/app/release/latest.yml
          - os: ubuntu-latest
            target: linux
            artifacts: |
              packages/app/release/*.AppImage
              packages/app/release/latest-linux.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        # version 由根 package.json 的 packageManager 字段决定（10.33.2）；
        # action-setup@v4 起不允许同时指定 version+packageManager，否则
        # ERR_PNPM_BAD_PM_VERSION。v5 仅升 Node 24 runtime，行为不变。

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # electron-builder 不签名 build。后续申请 Apple Developer ID / Authenticode
      # 后再加 CSC_LINK / CSC_KEY_PASSWORD secrets 启用签名 + notarize。
      - name: Build & package
        env:
          # disable auto-publish；我们自己 upload
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @muicv/app package:${{ matrix.target }}

      - name: List output
        shell: bash
        run: ls -lah packages/app/release || true

      - name: Upload artifacts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: muicv-${{ matrix.target }}-${{ github.run_id }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
          retention-days: 14

      # notes 已由 create-release job 一次性生成；这里只负责 append assets
      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false
