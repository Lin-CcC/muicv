name: Release Mui简历 desktop app

# 触发：
#   1) push tag 形如 v0.1.0 / v1.2.3 → 构建并 upload 到对应 GitHub Release
#   2) workflow_dispatch → 手动跑（用于自测；不会创建 release）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 同时只跑一份 build，避免并发抢同一个 release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 先把 release 创出来，notes 一次性由 GH 自动生成
  # （否则 matrix 三个 build job 各调一次 action-gh-release，会把 changelog
  # 重复 append 三次）
  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release with auto notes
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true

  build:
    name: Build & package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # !cancelled() 让 workflow_dispatch 时（create-release 被 if 跳过）
    # build 仍能跑；tag push 时如果 create-release 失败这里也会 skip
    needs: [create-release]
    if: ${{ !cancelled() }}

    permissions:
      contents: write # 创建 / 上传 release

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifacts: |
              packages/app/release/*.dmg
              packages/app/release/*.zip
              packages/app/release/latest-mac.yml
          - os: windows-latest
            target: win
            artifacts: |
              packages/app/release/*.exe
              packages/app/release/*.exe.blockmap
              packages/app/release/latest.yml
          - os: ubuntu-latest
            target: linux
            artifacts: |
              packages/app/release/*.AppImage
              packages/app/release/latest-linux.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        # version 由根 package.json 的 packageManager 字段决定（10.33.2）；
        # action-setup@v4 起不允许同时指定 version+packageManager，否则
        # ERR_PNPM_BAD_PM_VERSION。v5 仅升 Node 24 runtime，行为不变。

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # mac 签名 + 公证：把两个 base64 secret（.p12 证书 + .p8 API key）解码到
      # runner 临时目录，把路径和其它凭据通过 $GITHUB_ENV 注入下一步。
      # ⚠️ 必须 mac-only：CSC_LINK 在 win runner 上会被识别为 WIN_CSC_LINK 触发
      # Authenticode 流程，而我们暂未做 Win 签名，会失败。
      # 用 $GITHUB_ENV 而不是 step env: 块——因为 electron-builder 的 CSC_LINK 期望
      # 「文件路径 / data URL / https URL」，裸 base64 会被当文件路径报 ENAMETOOLONG。
      - name: Setup macOS signing (mac only)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          CSC_LINK_B64: ${{ secrets.CSC_LINK }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          P12="$RUNNER_TEMP/apple/cert.p12"
          P8="$RUNNER_TEMP/apple/AuthKey.p8"
          printf '%s' "$CSC_LINK_B64" | base64 --decode > "$P12"
          printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$P8"

          # Fast-fail：electron-builder 在 cert 不可用时会 silently fall back 到
          # ad-hoc 签名，再走完整 notarize 才报错（浪费 ~1min + Apple quota）。
          # 这里提前用 openssl 验一次密码是否对得上 .p12，错了直接挂。
          echo "p12 size: $(wc -c <"$P12") bytes"
          echo "p8  size: $(wc -c <"$P8") bytes"
          if ! openssl pkcs12 -in "$P12" -password "pass:$CSC_KEY_PASSWORD" -noout 2>/dev/null; then
            echo "::error::cert.p12 无法用 CSC_KEY_PASSWORD 解开。检查：(1) CSC_LINK secret 是否完整 base64？(2) CSC_KEY_PASSWORD 是否对应这次 .p12 的密码？"
            exit 1
          fi
          echo "✓ p12 + password OK"

          {
            echo "CSC_LINK=$P12"
            echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD"
            echo "APPLE_API_KEY=$P8"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      # 签名相关 env 全走上面 mac-only 那步注入。这里只设跨平台共用的 GH_TOKEN。
      # win/linux runner 没有任何 CSC_*/APPLE_* 环境变量，electron-builder 自动跳签名。
      - name: Build & package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @muicv/app package:${{ matrix.target }}

      - name: List output
        shell: bash
        run: ls -lah packages/app/release || true

      - name: Upload artifacts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: muicv-${{ matrix.target }}-${{ github.run_id }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
          retention-days: 14

      # notes 已由 create-release job 一次性生成；这里只负责 append assets
      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false
