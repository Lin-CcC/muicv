appId: com.meathill.muicv
productName: Mui简历
copyright: © 2026 meathill

directories:
  output: release
  buildResources: build

asar: true

# electron-vite 把所有 bundle 输出到 out/，只把这些 + package.json 打进 .app
files:
  - "out/**/*"
  - "package.json"
  - "!**/*.map"

extraMetadata:
  main: out/main/index.js

# ============ macOS ============
mac:
  category: public.app-category.productivity
  # 不签名（unsigned）。用户首次安装时需要右键 → 打开 → 允许。
  # M5+ 申请 Apple Developer ID 后改成具体身份。
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  # 强制 arch 后缀，让 x64 也带显式 arch（默认 x64 不带后缀，会让 landing page
  # 解析时分不清架构，v0.1.0 已踩过这个坑）。
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # 注册 muicv:// scheme（OAuth-style 登录回调用）
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLName: com.meathill.muicv.oauth
        CFBundleURLSchemes:
          - muicv

# 顶层 protocols 给 Windows / Linux 用
# （macOS 走 mac.extendInfo.CFBundleURLTypes，与之不冲突）
protocols:
  - name: Mui简历 OAuth
    schemes: [muicv]

dmg:
  writeUpdateInfo: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ============ Windows ============
# 不签名（unsigned）。用户首次运行会撞 SmartScreen 警告，需要点 "更多信息 → 仍要运行"。
# 申请 Authenticode 证书后再开启 signAndEditExecutable。
win:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false                          # 让用户能选安装路径，不要静默安装
  perMachine: false                        # 装到当前用户目录，不需要管理员
  allowToChangeInstallationDirectory: true

# ============ Linux ============
linux:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: Office
  target:
    - target: AppImage
      arch: [x64]

# 先不挂 publisher，build 出来本地自测，Phase 5 接 GitHub Actions
publish: null
