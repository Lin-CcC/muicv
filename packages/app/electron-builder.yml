appId: com.meathill.muicv
productName: Mui简历
copyright: © 2026 meathill

directories:
  output: release
  buildResources: build

asar: true

# electron-vite 把所有 bundle 输出到 out/，只把这些 + package.json 打进 .app
files:
  - "out/**/*"
  - "package.json"
  - "!**/*.map"

extraMetadata:
  main: out/main/index.js

# ============ macOS ============
mac:
  category: public.app-category.productivity
  # 已签名 + 公证（notarize）。
  # 不设 identity 字段 → electron-builder 自动 discover：本地从 login keychain 找
  # Developer ID Application 证书；CI 从 CSC_LINK 解出 .p12 导入临时 keychain。
  # ⚠️ identity: null 是「显式跳过签名」，不是 auto，别加。
  # 如果 keychain 里有多个 Developer ID Application，可用 CSC_NAME 环境变量
  # 或在此处显式 identity: "Developer ID Application: 名字 (TEAMID)" 锁定。
  # hardenedRuntime 是公证硬性要求；entitlements 给 Electron 解禁 JIT / dyld / network。
  # 公证依赖环境变量：APPLE_API_KEY (路径) / APPLE_API_KEY_ID / APPLE_API_ISSUER。
  # 详见 DEV_NOTE.md「packages/app macOS 签名 + 公证」一节。
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # v26 schema：notarize 是 boolean，team / 凭据全走环境变量
  # (APPLE_API_KEY 路径 / APPLE_API_KEY_ID / APPLE_API_ISSUER)。
  notarize: true
  # 强制 arch 后缀，让 x64 也带显式 arch（默认 x64 不带后缀，会让 landing page
  # 解析时分不清架构，v0.1.0 已踩过这个坑）。
  artifactName: "MuiCV-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # 注册 muicv:// scheme（OAuth-style 登录回调用）
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLName: com.meathill.muicv.oauth
        CFBundleURLSchemes:
          - muicv

# 顶层 protocols 给 Windows / Linux 用
# （macOS 走 mac.extendInfo.CFBundleURLTypes，与之不冲突）
protocols:
  - name: Mui简历 OAuth
    schemes: [muicv]

dmg:
  writeUpdateInfo: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ============ Windows ============
# 不签名（unsigned）。用户首次运行会撞 SmartScreen 警告，需要点 "更多信息 → 仍要运行"。
# 申请 Authenticode 证书后再开启 signAndEditExecutable。
win:
  artifactName: "MuiCV-${version}-${arch}.${ext}"
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false                          # 让用户能选安装路径，不要静默安装
  perMachine: false                        # 装到当前用户目录，不需要管理员
  allowToChangeInstallationDirectory: true

# ============ Linux ============
linux:
  artifactName: "MuiCV-${version}-${arch}.${ext}"
  category: Office
  target:
    - target: AppImage
      arch: [x64]

# publish 配 github provider 是为了让 electron-builder 写出
# latest-mac.yml / latest.yml / latest-linux.yml 这三份 update manifest
# （否则 electron-updater 在客户端拿不到升级清单）。
# 实际上传到 release 还是走 workflow 里的 softprops/action-gh-release，
# 所以 npm script 里要保留 `--publish never` 让 electron-builder 不要自己上传。
publish:
  provider: github
  owner: meathill
  repo: muicv
