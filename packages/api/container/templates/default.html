<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{{title}}</title>
    <style>
      /* 基础排版 —— A4 默认模板，单栏、1-2 页简历 */
      :root {
        --ink: #111827;
        --ink-soft: #374151;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #111827;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        font-family:
          'Noto Sans CJK SC', 'Noto Sans', 'PingFang SC', 'Helvetica Neue',
          Arial, sans-serif;
        color: var(--ink);
        font-size: 10.5pt;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      body {
        max-width: 170mm;   /* A4 扣掉左右 margin 后的可视区域 */
        margin: 0 auto;
      }

      /* 打印分页友好 */
      h1, h2, h3 { page-break-after: avoid; }
      li, p { orphans: 3; widows: 3; }

      /* 顶部姓名区（第一个 h1） */
      h1 {
        font-size: 22pt;
        font-weight: 700;
        margin: 0 0 4pt;
        letter-spacing: 0.5px;
      }

      /* h1 后面紧跟的 p 是"联络一行" */
      h1 + p {
        margin: 0 0 12pt;
        color: var(--ink-soft);
        font-size: 10pt;
      }

      /* 一级分区 —— ## Summary / ## 工作经历 */
      h2 {
        font-size: 12pt;
        font-weight: 700;
        margin: 16pt 0 6pt;
        padding-bottom: 3pt;
        border-bottom: 1.2px solid var(--accent);
        text-transform: none;
        letter-spacing: 0.3px;
      }

      /* 单项经历 / 项目 —— ### 职位 — 公司 */
      h3 {
        font-size: 10.5pt;
        font-weight: 700;
        margin: 10pt 0 2pt;
      }

      /* h3 后面紧跟的 p 是"时间 · 地点 · 技术栈" */
      h3 + p {
        margin: 0 0 4pt;
        color: var(--muted);
        font-size: 9.5pt;
      }

      p {
        margin: 0 0 6pt;
      }

      ul {
        margin: 2pt 0 8pt;
        padding-left: 16pt;
      }
      li {
        margin: 0 0 2pt;
      }

      a {
        color: var(--ink);
        text-decoration: none;
        border-bottom: 0.5px solid var(--line);
      }

      code {
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
        background: #f3f4f6;
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 0.92em;
      }

      /* 第一个 h2 顶部不要额外的 margin */
      h1 + p + h2, h1 + h2 { margin-top: 12pt; }

      @page {
        size: A4;
        /* Worker 调用 puppeteer.pdf() 时会传 margin，所以这里不重复设置 */
      }
    </style>
  </head>
  <body>
    {{content}}
  </body>
</html>
